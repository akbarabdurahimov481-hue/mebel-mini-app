<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IZZAT MEBEL Katalogi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --text-color: #222;
            --card-bg: #ffffff;
            --active-color: #e53935; /* Chiroyli qizil rang */
            --gray-text: #888;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding-bottom: 70px;
        }

        /* --- HEADER --- */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h2 {
            font-size: 24px;
            font-weight: 800;
        }
        .header-icon {
            font-size: 20px;
            color: var(--text-color);
        }

        /* --- CATEGORIES --- */
        .categories-wrapper {
            padding: 0 15px 15px 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .categories-wrapper::-webkit-scrollbar {
            display: none;
        }
        .category-chip {
            padding: 8px 16px;
            background: #eef1f4;
            color: #555;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-chip.active {
            background: var(--active-color);
            color: #fff;
        }

        /* --- PRODUCTS GRID --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 15px;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f0f0f0;
        }
        .product-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-color);
            margin-top: auto;
            margin-bottom: 5px;
        }
        .add-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: var(--active-color);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(229, 57, 53, 0.3);
            transition: transform 0.1s;
        }
        .add-btn:active {
            transform: scale(0.9);
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 15px 0;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray-text);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
        }
        .nav-item.active {
            color: var(--active-color);
        }
        .nav-icon {
            font-size: 22px;
        }
        .cart-badge {
            position: absolute;
            top: -2px;
            right: 15px;
            background: var(--active-color);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }
        .loading-text {
            grid-column: span 2;
            text-align: center;
            padding: 40px;
            color: var(--gray-text);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Katalog</h2>
        <div class="header-icon">🔍</div>
    </div>

    <div class="categories-wrapper" id="categories-container">
        <div class="category-chip active">Barchasi</div>
    </div>

    <div class="products-grid" id="products-container">
        <div class="loading-text">Mebellar yuklanmoqda...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="switchTab(this)">
            <span class="nav-icon">🏠</span>
            <span>Asosiy</span>
        </div>
        <div class="nav-item active" onclick="switchTab(this)">
            <span class="nav-icon">🗂️</span>
            <span>Katalog</span>
        </div>
        <div class="nav-item" onclick="switchTab(this)">
            <span class="nav-icon">🛒</span>
            <span class="cart-badge" id="cart-badge">0</span>
            <span>Savat</span>
        </div>
        <div class="nav-item" onclick="switchTab(this)">
            <span class="nav-icon">👤</span>
            <span>Profil</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        // 🟢 BACKEND MANZILI (O'zingizning ngrok xostingizni kiriting)
        const API_URL = "http://localhost:8080/api/products"; 

        let products = [];
        let categories = ["Barchasi"];
        let currentCategory = "Barchasi";
        let cart = [];

        // Sahifa yuklanganda API'dan ma'lumot olish
        window.onload = () => {
            fetchProductsFromBackend();
        };

        // Backend API orqali ma'lumotlarni tortish
        function fetchProductsFromBackend() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    products = data;
                    
                    // Mahsulotlar ichidan unikal kategoriyalarni ajratib olish
                    let uniqueCategories = [...new Set(products.map(p => p.category))];
                    categories = ["Barchasi", ...uniqueCategories];
                    
                    renderCategories();
                    renderProducts();
                })
                .catch(error => {
                    console.error("Xatolik yuz berdi:", error);
                    document.getElementById('products-container').innerHTML = 
                        `<p class="loading-text" style="color:red;">Ma'lumotlarni yuklashda xatolik yuz berdi!</p>`;
                });
        }

        // Gorizontal menyuda kategoriyalarni chiqarish
        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            categories.forEach(cat => {
                let chip = document.createElement('div');
                chip.className = `category-chip ${cat === currentCategory ? 'active' : ''}`;
                chip.innerText = cat;
                chip.onclick = () => {
                    currentCategory = cat;
                    renderCategories(); 
                    renderProducts();   
                };
                container.appendChild(chip);
            });
        }

        // Mahsulotlarni ekranga chiqarish (Grid format)
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            let filteredProducts = currentCategory === "Barchasi" 
                ? products 
                : products.filter(p => p.category === currentCategory);

            if(filteredProducts.length === 0) {
                container.innerHTML = `<p style="grid-column: span 2; text-align:center; color:#888; padding: 40px;">Ushbu bo'limda mahsulot yo'q</p>`;
                return;
            }

            filteredProducts.forEach(p => {
                let card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.img || 'https://via.placeholder.com/150'}" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">${formatPrice(p.price)} so'm</div>
                    <button class="add-btn" onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price})">+</button>
                `;
                container.appendChild(card);
            });
        }

        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        // Savatga qo'shish va Telegram pastki Tugmasini yangilash
        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.style.display = 'block';

            // Telegram asosiq tugmasini (MainButton) o'zgartirish
            tg.MainButton.text = `Buyurtma berish (${cart.length} ta)`;
            tg.MainButton.color = "#e53935"; 
            tg.MainButton.show();
        }

        function switchTab(element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        // Telegram Main tugmasi bosilganda ma'lumotni botga qaytarish
        tg.MainButton.onClick(() => {
            if(cart.length > 0) {
                tg.sendData(JSON.stringify(cart)); // Ma'lumot botga ketadi
                tg.close(); // Oynani yopish
            }
        });
    </script>
</body>
</html>
