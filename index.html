<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mebel Do'koni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f4f6f9);
            --text-color: var(--tg-theme-text-color, #222222);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; }
        
        .header { text-align: center; margin-bottom: 15px; }
        
        /* Kategoriya */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .category-btn { background: var(--card-bg); border: 1px solid #ccc; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .category-btn.active { background: var(--button-color); color: var(--button-text); border: none; }

        /* Mahsulotlar */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 10px; text-align: center; }
        .product-image { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        .add-btn { background: var(--button-color); color: var(--button-text); border: none; padding: 8px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }

        /* Admin Modal */
        #admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 12px; width: 80%; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div class="header"><h2>Mebel Olami</h2></div>

    <button id="admin-btn" style="display:none; width:100%; padding:10px; background:#ff9800; border:none; color:white; border-radius:8px; margin-bottom:10px;" onclick="openAdminModal()">⚙️ Mahsulot qo'shish / Boshqarish</button>

    <div class="categories" id="category-container">
        <div class="category-btn active" onclick="filterProducts('Barchasi', this)">Barchasi</div>
        <div class="category-btn" onclick="filterProducts('Oshxona (Klassik)', this)">Oshxona (Klassik)</div>
        <div class="category-btn" onclick="filterProducts('Oshxona (Oddiy)', this)">Oshxona (Oddiy)</div>
        <div class="category-btn" onclick="filterProducts('Yotoqxona', this)">Yotoqxona</div>
        <div class="category-btn" onclick="filterProducts('Ofis', this)">Ofis</div>
    </div>

    <div class="products-grid" id="products-container"></div>

    <div id="admin-modal">
        <div class="modal-content">
            <h3>Yangi Mebel</h3>
            <input type="text" id="new-name" placeholder="Nomi">
            <input type="number" id="new-price" placeholder="Narxi">
            <select id="new-category">
                <option value="Oshxona (Klassik)">Oshxona (Klassik)</option>
                <option value="Oshxona (Oddiy)">Oshxona (Oddiy)</option>
                <option value="Yotoqxona">Yotoqxona</option>
                <option value="Ofis">Ofis</option>
            </select>
            <input type="text" id="new-img" placeholder="Rasm URL">
            <button class="add-btn" onclick="saveProduct()">Saqlash</button>
            <button onclick="closeAdminModal()" style="background:red; color:white; border:none; padding:8px;">Yopish</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const MY_ADMIN_ID = 5854906145;
        let defaultProducts = [
            { id: 1, name: "Qirollik stoli", price: 2500000, category: "Oshxona (Klassik)", img: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=300" }
        ];

        // Xatolik tuzatildi: || operatori qo'shildi
        let products = JSON.parse(localStorage.getItem('mebel_products')) || defaultProducts;
        let cart = [];

        window.onload = () => {
            renderProducts('Barchasi');
            if (tg.initDataUnsafe?.user?.id == MY_ADMIN_ID) {
                document.getElementById('admin-btn').style.display = 'block';
            }
        };

        // Filtr funksiyasi
        function filterProducts(category, element) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderProducts(category);
        }

        function renderProducts(categoryFilter) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            let filtered = (categoryFilter === 'Barchasi') ? products : products.filter(p => p.category === categoryFilter);
            
            filtered.forEach(p => {
                let card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `<img class="product-image" src="${p.img}"><div style="font-weight:bold">${p.name}</div><div style="color:var(--button-color)">${p.price.toLocaleString()} so'm</div><button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">Savatga</button>`;
                container.appendChild(card);
            });
        }

        function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeAdminModal() { document.getElementById('admin-modal').style.display = 'none'; }

        function saveProduct() {
            let name = document.getElementById('new-name').value;
            let price = parseInt(document.getElementById('new-price').value);
            let category = document.getElementById('new-category').value;
            // Xatolik tuzatildi: || operatori qo'shildi
            let img = document.getElementById('new-img').value || 'https://via.placeholder.com/150';

            if (!name || !price) return alert("Ma'lumot to'liq emas!");

            products.push({ id: Date.now(), name, price, category, img });
            localStorage.setItem('mebel_products', JSON.stringify(products));
            
            closeAdminModal();
            renderProducts('Barchasi');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            tg.MainButton.text = `Savat: ${cart.length} ta`;
            tg.MainButton.show();
        }

        tg.MainButton.onClick(() => tg.sendData(JSON.stringify(cart)));
    </script>
</body>
</html>
