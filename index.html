<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mebel Do'koni Katalogi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --text-color: #222;
            --card-bg: #ffffff;
            --active-color: #e53935; /* Rasmdagi qizil rang */
            --gray-text: #888;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding-bottom: 70px; /* Pastki menyu uchun joy */
        }

        /* --- YUQORI QISM (HEADER) --- */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h2 {
            font-size: 24px;
            font-weight: 800;
        }
        .header-icon {
            font-size: 20px;
            color: var(--text-color);
        }

        /* --- KATEGORIYALAR (GORIZONTAL MENYU) --- */
        .categories-wrapper {
            padding: 0 15px 15px 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            /* Scrollbarni yashirish */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .categories-wrapper::-webkit-scrollbar {
            display: none;
        }
        .category-chip {
            padding: 8px 16px;
            background: #eef1f4;
            color: #555;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-chip.active {
            background: var(--active-color);
            color: #fff;
        }

        /* --- MAHSULOTLAR GRIDI --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 15px;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f0f0f0;
        }
        .product-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-color);
            margin-top: auto;
            margin-bottom: 5px;
        }
        .add-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: var(--active-color);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(229, 57, 53, 0.3);
            transition: transform 0.1s;
        }
        .add-btn:active {
            transform: scale(0.9);
        }

        /* --- PASTKI NAVIGATSIYA --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 15px 0;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--gray-text);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
        }
        .nav-item.active {
            color: var(--active-color);
        }
        .nav-icon {
            font-size: 22px;
        }
        .cart-badge {
            position: absolute;
            top: -2px;
            right: 15px;
            background: var(--active-color);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

    </style>
</head>
<body>

    <div class="header">
        <h2>Katalog</h2>
        <div class="header-icon">🔍</div>
    </div>

    <div class="categories-wrapper" id="categories-container">
        </div>

    <div class="products-grid" id="products-container">
        </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="switchTab(this)">
            <span class="nav-icon">🏠</span>
            <span>Asosiy</span>
        </div>
        <div class="nav-item active" onclick="switchTab(this)">
            <span class="nav-icon">🗂️</span>
            <span>Katalog</span>
        </div>
        <div class="nav-item" onclick="switchTab(this)">
            <span class="nav-icon">🛒</span>
            <span class="cart-badge" id="cart-badge">0</span>
            <span>Savat</span>
        </div>
        <div class="nav-item" onclick="switchTab(this)">
            <span class="nav-icon">👤</span>
            <span>Profil</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Ekranni to'liq ochish

        // Ma'lumotlar bazasi (Siz tomondan keladigan yoki o'zgartiriladigan data)
        const categories = ["Barchasi", "Oshxona", "Yotoqxona", "Ofis", "Yumshoq mebel"];
        
        const products = [
            { id: 1, name: "Premium oshxona stoli va 6 ta stul", price: 4500000, category: "Oshxona", img: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=300" },
            { id: 2, name: "Rahbar ofis kreslosi (Qora charmli)", price: 1200000, category: "Ofis", img: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?w=300" },
            { id: 3, name: "Zamonaviy yotoqxona shkafi", price: 3200000, category: "Yotoqxona", img: "https://images.unsplash.com/photo-1595514535415-ebad07b5391e?w=300" },
            { id: 4, name: "Yumshoq L-simon burchak divan", price: 5800000, category: "Yumshoq mebel", img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=300" },
            { id: 5, name: "Yog'ochli kofe stoli", price: 850000, category: "Yumshoq mebel", img: "https://images.unsplash.com/photo-1532372320572-cda25653a26d?w=300" },
            { id: 6, name: "Ergonomik xodim stoli", price: 1500000, category: "Ofis", img: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6ea?w=300" }
        ];

        let currentCategory = "Barchasi";
        let cart = [];

        // Ishga tushganda render qilish
        window.onload = () => {
            renderCategories();
            renderProducts();
        };

        // Gorizontal kategoriyalarni chizish
        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            categories.forEach(cat => {
                let chip = document.createElement('div');
                chip.className = `category-chip ${cat === currentCategory ? 'active' : ''}`;
                chip.innerText = cat;
                chip.onclick = () => {
                    currentCategory = cat;
                    renderCategories(); // Aktiv rangni o'zgartirish uchun qayta chizamiz
                    renderProducts();   // Mahsulotlarni filtrlash uchun
                };
                container.appendChild(chip);
            });
        }

        // Mahsulotlarni chizish
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            // Barchasi bo'lsa hammasini, aks holda filter qilib ko'rsatamiz
            let filteredProducts = currentCategory === "Barchasi" 
                ? products 
                : products.filter(p => p.category === currentCategory);

            if(filteredProducts.length === 0) {
                container.innerHTML = `<p style="grid-column: span 2; text-align:center; color:#888; padding: 20px;">Bu bo'limda mahsulot yo'q</p>`;
                return;
            }

            filteredProducts.forEach(p => {
                let card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.img}" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">${formatPrice(p.price)} so'm</div>
                    <button class="add-btn" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">+</button>
                `;
                container.appendChild(card);
            });
        }

        // Narxlarni chiroyli ko'rsatish (Masalan: 4 500 000)
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        // Savatga qo'shish va Telegram Main Buttonni boshqarish
        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            
            // Savat znachogini yangilash
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.style.display = 'block';

            // Telegram pastki katta tugmasini yoqish
            tg.MainButton.text = `Savatga o'tish (${cart.length} ta)`;
            tg.MainButton.color = "#e53935"; // Qizil rang
            tg.MainButton.show();
        }

        // Pastki menyu animatsiyasi (vizual)
        function switchTab(element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        // Telegram tugmasi bosilganda ma'lumotni botga jo'natish
        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        });

    </script>
</body>
</html>
